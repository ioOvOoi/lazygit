# An opencode-inspired theme for lazygit: a soft, low-contrast dark palette
# (Catppuccin-Mocha-like) with a warm peach accent for the focused panel,
# muted grey borders for unfocused panels, and a subtle selection highlight.
#
# Usage (without touching your main config):
#   LG_CONFIG_FILE="$HOME/.config/lazygit/config.yml,/path/to/opencode.yml" lazygit
# or copy the `gui.theme` / `gui.border` values below into your own config.yml.
#
# Requires a terminal with true-color (24-bit) support. Set nerdFontsVersion to
# "3" if your terminal uses a Nerd Font and you want file-type icons.
gui:
  border: rounded
  nerdFontsVersion: ""
  theme:
    activeBorderColor:
      - "#fab387"
      - bold
    inactiveBorderColor:
      - "#6c7086"
    searchingActiveBorderColor:
      - "#f9e2af"
      - bold
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#292a3d"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#f9e2af"
    markedBaseCommitBgColor:
      - "#45475a"
